name: continuous

on: [push]

jobs:
  macOS-10_14:
    name: macOS-10_14
    runs-on: macOS-10.14
    steps:
      - uses: actions/checkout@v1
      - name: Run './build.cmd'
        run: ./build.cmd
        env:
            GitHubToken: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v1
  ubuntu-16_04:
    name: ubuntu-16_04
    runs-on: ubuntu-16.04
    steps:
      - uses: actions/checkout@v1
      - name: Run './build.cmd'
        run: ./build.cmd
        env:
            GitHubToken: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v1
  ubuntu-18_04:
    name: ubuntu-18_04
    runs-on: ubuntu-18.04
    steps:
      - uses: actions/checkout@v1
      - name: Run './build.cmd'
        run: ./build.cmd
        env:
            GitHubToken: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v1
  windows-2016:
    name: windows-2016
    runs-on: windows-2016
    steps:
      - uses: actions/checkout@v1
      - name: Run './build.cmd'
        run: ./build.cmd
        env:
            GitHubToken: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v1
  windows-2019:
    name: windows-2019
    runs-on: windows-2019
    steps:
      - uses: actions/checkout@v1
      - name: Run './build.cmd'
        run: ./build.cmd
        env:
            GitHubToken: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v1
